name: Build unsigned IPA
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Environment
        run: |
          xcodebuild -version
          echo "--- schemes/targets ---"
          xcodebuild -list -project OcrServer.xcodeproj || true
      - name: Build (no code signing)
        run: |
          set -o pipefail
          xcodebuild clean build \
            -project OcrServer.xcodeproj \
            -scheme OcrServer \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO | tail -50
      - name: Package IPA
        run: |
          APP=$(find build/Build/Products -name "*.app" -maxdepth 3 | head -1)
          echo "APP=$APP"
          mkdir -p Payload
          cp -R "$APP" Payload/
          zip -qr OcrServer-unsigned.ipa Payload
          ls -la OcrServer-unsigned.ipa
      - uses: actions/upload-artifact@v4
        with:
          name: OcrServer-unsigned-ipa
          path: OcrServer-unsigned.ipa
